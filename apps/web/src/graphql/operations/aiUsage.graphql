query AiUsageRecords($page: Int, $pageSize: Int, $sortBy: String, $sortOrder: SortOrder) {
  aiUsageRecords(page: $page, pageSize: $pageSize, sortBy: $sortBy, sortOrder: $sortOrder) {
    items {
      id
      userId
      projectId
      taskId
      provider
      modelName
      requestType
      promptTokens
      completionTokens
      requestDurationMs
      estimatedCost
      createdAt
    }
    meta {
      page
      total
      hasMore
      pageSize
    }
  }
}

