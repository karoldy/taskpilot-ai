services:
  postgres:
    image: postgres:16
    container_name: taskpilot-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: taskpilot
      POSTGRES_PASSWORD: taskpilot123
      POSTGRES_DB: taskpilot
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
